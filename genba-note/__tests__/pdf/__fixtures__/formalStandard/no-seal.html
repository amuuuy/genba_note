<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Hiragino Kaku Gothic Pro', 'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', sans-serif;
      font-size: 12px;
      line-height: 1.5;
      color: #000;
      padding: 30px 40px;
      background: #fff;
    }

    .document-container {
      max-width: 800px;
      margin: 0 auto;
    }

    /* === Title === */
    .formal-title {
      font-size: 26px;
      font-weight: bold;
      text-align: center;
      letter-spacing: 0.3em;
      border-bottom: 2px solid #000;
      padding-bottom: 8px;
      margin-bottom: 25px;
    }

    /* === Two-column header === */
    .formal-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .header-left {
      flex: 1;
    }

    .header-right {
      text-align: right;
      font-size: 12px;
    }

    /* === Meta info === */
    .header-meta {
      margin-bottom: 15px;
    }

    .meta-row {
      margin-bottom: 4px;
    }

    .meta-label {
      font-weight: bold;
    }

    /* === Client section === */
    .formal-client-name {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 4px;
    }

    .formal-client-name::after {
      content: ' 御中';
      font-weight: normal;
    }

    .client-address {
      font-size: 12px;
      color: #333;
    }

    /* === Greeting === */
    .greeting-text {
      font-size: 12px;
      margin-top: 15px;
    }

    /* === Issuer block: info BESIDE seal (flexbox row) === */
    .header-issuer-block {
      display: flex;
      justify-content: flex-end;
      align-items: flex-start;
      gap: 10px;
    }

    .issuer-info {
      text-align: right;
    }

    .issuer-company {
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 4px;
    }

    .issuer-address {
      font-size: 11px;
      margin-bottom: 2px;
    }

    .issuer-tel-fax {
      font-size: 11px;
      margin-bottom: 2px;
    }

    .issuer-invoice-number {
      font-size: 11px;
      margin-bottom: 2px;
      color: #333;
    }

    .issuer-contact {
      font-size: 11px;
      margin-bottom: 2px;
    }

    /* === Seal container (beside issuer info) === */
    .issuer-seal {
      flex-shrink: 0;
      width: 70px;
      height: 70px;
    }

    .seal-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
      opacity: 0.85;
      mix-blend-mode: multiply;
      print-color-adjust: exact;
      -webkit-print-color-adjust: exact;
    }

    /* === Info box === */
    .info-box {
      border: 1px solid #000;
      padding: 10px 15px;
      margin-bottom: 20px;
    }

    .info-box-row {
      margin-bottom: 6px;
    }

    .info-box-row:last-child {
      margin-bottom: 0;
    }

    .info-box-label {
      font-weight: bold;
      font-size: 11px;
      margin-right: 8px;
    }

    .info-box-value {
      font-size: 12px;
    }

    .bank-info-line {
      font-size: 11px;
      margin-left: 4px;
    }

    /* === Total amount box === */
    .total-amount-box {
      border: 2px solid #000;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      margin-bottom: 20px;
    }

    .total-amount-box .label {
      font-size: 14px;
      font-weight: bold;
    }

    .total-amount-box .amount {
      font-size: 22px;
      font-weight: bold;
    }

    /* === Line items table === */
    .formal-items-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 20px;
      print-color-adjust: exact;
      -webkit-print-color-adjust: exact;
    }

    .formal-items-table th {
      background: #000;
      color: #fff;
      padding: 10px;
      text-align: left;
      font-weight: bold;
      font-size: 11px;
      print-color-adjust: exact;
      -webkit-print-color-adjust: exact;
    }

    .formal-items-table td {
      padding: 8px 10px;
      border-bottom: 1px solid #ccc;
      font-size: 11px;
    }

    .formal-items-table tr:nth-child(even) {
      background: #f5f5f5;
      print-color-adjust: exact;
      -webkit-print-color-adjust: exact;
    }

    .formal-items-table .col-name { width: 45%; }
    .formal-items-table .col-qty { width: 10%; text-align: right; }
    .formal-items-table .col-unit { width: 10%; text-align: center; }
    .formal-items-table .col-price { width: 15%; text-align: right; }
    .formal-items-table .col-total { width: 20%; text-align: right; }

    .formal-items-table .item-qty,
    .formal-items-table .item-price,
    .formal-items-table .item-total { text-align: right; }
    .formal-items-table .item-unit { text-align: center; }

    /* === Totals section (right-aligned, dotted borders) === */
    .formal-totals-section {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 20px;
    }

    .formal-totals-table {
      border-collapse: collapse;
      min-width: 250px;
    }

    .formal-totals-table td {
      padding: 6px 12px;
      font-size: 12px;
    }

    .formal-totals-table .totals-label {
      text-align: left;
      border-right: 1px solid #ccc;
    }

    .formal-totals-table .totals-value {
      text-align: right;
    }

    .formal-totals-table tr {
      border-bottom: 1px dotted #999;
    }

    .formal-totals-table .carried-forward-row td {
      color: #666;
    }

    .formal-totals-table .tax-breakdown-row td {
      font-size: 10px;
      color: #666;
      padding: 3px 12px;
    }

    .formal-totals-table .tax-rate-label {
      padding-left: 20px;
    }

    /* Total final row - most emphasized */
    .formal-totals-table .total-final-row {
      border-top: 2px solid #000;
      border-bottom: 2px solid #000;
      background: #f5f5f5;
      print-color-adjust: exact;
      -webkit-print-color-adjust: exact;
    }

    .formal-totals-table .total-final-row td {
      font-weight: bold;
      padding-top: 10px;
      padding-bottom: 10px;
    }

    .formal-totals-table .total-final-label {
      font-size: 13px;
    }

    .formal-totals-table .total-final-value {
      font-size: 16px;
      color: #000;
    }

    /* === Notes section === */
    .formal-notes-section {
      margin: 25px 0;
      border: 1px solid #999;
    }

    .notes-title {
      background: #f0f0f0;
      padding: 6px 10px;
      font-size: 11px;
      font-weight: bold;
      border-bottom: 1px solid #999;
      print-color-adjust: exact;
      -webkit-print-color-adjust: exact;
    }

    .notes-content {
      padding: 10px;
      font-size: 11px;
      white-space: pre-wrap;
    }

    /* === Print === */
    @media print {
      body { padding: 20px; }
      .document-container { max-width: none; }
    }
  
    
    /* Header - No background fill, clean border only */
    .header {
      background: transparent;
      border-bottom: 2px solid #333333;
      padding: 24px 0;
    }

    .document-title {
      font-size: 24px;
      font-weight: bold;
      color: #333333;
      text-align: center;
      letter-spacing: 0.1em;
    }

    .document-meta {
      margin-top: 12px;
    }

    /* Total Amount Box - Border emphasis only, no background */
    .total-box {
      border: 2px solid #333333;
      background: transparent;
      padding: 16px 20px;
      border-radius: 0;
    }

    .total-box .label {
      font-size: 13px;
      color: #666666;
    }

    .total-box .amount {
      font-size: 28px;
      font-weight: bold;
      color: #333333;
    }

    /* Table - Thin borders, zebra striping */
    .items-table th {
      background: transparent;
      color: #333333;
      border: 1px solid #666666;
      border-bottom: 2px solid #333333;
      font-weight: bold;
    }

    .items-table td {
      border: 1px solid #ddd;
      border-left: none;
      border-right: none;
    }

    .items-table tr:nth-child(even) {
      background: #f8f8f8;
    }

    .items-table tr:last-child td {
      border-bottom: 1px solid #666666;
    }

    /* Bank section - Simple border, no background */
    .bank-section {
      border: 1px solid #666666;
      background: transparent;
      border-radius: 0;
    }

    .bank-section h3 {
      color: #333333;
      font-weight: bold;
      border-bottom: 1px solid #ddd;
      padding-bottom: 8px;
      margin-bottom: 10px;
    }

    /* Due date - No background, simple border */
    .due-date-section {
      background: transparent;
      border: 1px solid #666666;
      border-radius: 0;
    }

    .due-date-section .label {
      color: #333333;
      font-weight: bold;
    }

    /* Subject section - Light gray background */
    .subject-section {
      background: #f8f8f8;
      border-radius: 0;
    }

    /* Notes section - Light gray background */
    .notes-section {
      background: #f8f8f8;
      border-radius: 0;
    }

    .notes-section h3 {
      color: #333333;
    }

    /* Client section - Clean border */
    .client-section {
      border: 1px solid #666666;
      border-radius: 0;
    }

    /* Totals section */
    .totals-section {
      border: 1px solid #666666;
      border-radius: 0;
    }

    .total-final {
      font-size: 18px;
      color: #333333;
      border-top: 2px solid #333333;
      font-weight: bold;
    }

    /* Issuer section */
    .issuer-section {
      border-top: 1px solid #666666;
    }
  
    
  </style>
</head>
<body>
  <div class="document-container">
    
    <!-- Title -->
    <div class="formal-title">見　積　書</div>

    <!-- Two-column header -->
    <div class="formal-header">
      <div class="header-left">
        <div class="formal-client-name">テスト顧客</div>
        <div class="client-address">大阪府大阪市テスト町1-1</div>
        <div class="greeting-text">下記のとおりお見積り申し上げます。</div>
      </div>
      <div class="header-right">
        
        <div class="header-meta">
          <div class="meta-row"><span class="meta-label">見積日:</span> 2026年1月30日</div>
          <div class="meta-row"><span class="meta-label">見積書番号:</span> EST-001</div>
        </div>
  
        
      <div class="header-issuer-block">
        <div class="issuer-info">
          <div class="issuer-company">テスト株式会社</div>
          <div class="issuer-address">東京都渋谷区テスト1-2-3</div>
          <div class="issuer-tel-fax">TEL: 03-1234-5678</div>
        </div>
        
      </div>
  
      </div>
    </div>

    <!-- Info box (subject, period, bank info) -->
    
    <div class="info-box">
      
      <div class="info-box-row">
        <span class="info-box-label">件名:</span>
        <span class="info-box-value">テスト工事案件</span>
      </div>
    
      <div class="info-box-row">
        <span class="info-box-label">見積有効期限:</span>
        <span class="info-box-value">2026年2月28日</span>
      </div>
    
    </div>
  

    <!-- Total amount -->
    
    <div class="total-amount-box">
      <span class="label">合計（税込）</span>
      <span class="amount">11,000円</span>
    </div>
  

    <!-- Line items -->
    
    <table class="formal-items-table">
      <thead>
        <tr>
          <th class="col-name">摘要</th>
          <th class="col-qty">数量</th>
          <th class="col-unit">単位</th>
          <th class="col-price">単価（税抜）</th>
          <th class="col-total">金額（税抜）</th>
        </tr>
      </thead>
      <tbody>
        
        <tr>
          <td class="item-name">テスト工事</td>
          <td class="item-qty">1</td>
          <td class="item-unit">式</td>
          <td class="item-price">10,000円</td>
          <td class="item-total">10,000円</td>
        </tr>
      </tbody>
    </table>
  

    <!-- Totals -->
    
    <div class="formal-totals-section">
      <table class="formal-totals-table">
        <tr>
          <td class="totals-label">小計（税抜）</td>
          <td class="totals-value">10,000円</td>
        </tr>
        <tr class="tax-total-row">
          <td class="totals-label">消費税</td>
          <td class="totals-value">1,000円</td>
        </tr>
        
        <tr class="tax-breakdown-row">
          <td class="totals-label tax-rate-label">　消費税(10%)</td>
          <td class="totals-value">1,000円</td>
        </tr>
        <tr class="total-final-row">
          <td class="totals-label total-final-label">合計（税込）</td>
          <td class="totals-value total-final-value">11,000円</td>
        </tr>
      </table>
    </div>
  

    <!-- Notes -->
    
    <div class="formal-notes-section">
      <div class="notes-title">備考</div>
      <div class="notes-content">テスト備考欄</div>
    </div>
  
  </div>
</body>
</html>
