# CI: Test & Type Check
# Runs on every push to main and on all PRs targeting main.
#
# Branch protection (GitHub UI で手動設定):
#   Settings → Branches → Add rule for "main":
#   - Require status checks to pass: "test" job
#   - Require pull request reviews: 1 reviewer
#   - Dismiss stale pull request approvals when new commits are pushed

name: Test & Type Check

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: genba-note
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: genba-note/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify Edge Functions JWT enforcement
        working-directory: .
        run: |
          echo "Checking verify_jwt settings in supabase/config.toml..."
          CONFIG="supabase/config.toml"
          # Per-section validation: each [functions.*] must have verify_jwt = true
          awk '
            function check_section() {
              if (fn_section && has_true == 0) {
                printf "ERROR: %s missing verify_jwt = true\n", fn_section
                err = 1
              }
              if (fn_section && has_false) {
                printf "ERROR: %s has verify_jwt = false\n", fn_section
                err = 1
              }
            }
            /^\[/ {
              check_section()
              line = $0
              sub(/[[:space:]]*#.*/, "", line)
              gsub(/[[:space:]]+$/, "", line)
              if (line ~ /^\[functions\.[^]]+\]$/) {
                fn_section = line; has_true = 0; has_false = 0; count++
              } else {
                fn_section = ""; has_true = 0; has_false = 0
              }
            }
            /^[[:space:]]*verify_jwt[[:space:]]*=[[:space:]]*true([[:space:]]*(#.*)?)?$/ && fn_section { has_true = 1 }
            /^[[:space:]]*verify_jwt[[:space:]]*=[[:space:]]*false([[:space:]]*(#.*)?)?$/ && fn_section { has_false = 1 }
            END {
              check_section()
              if (count == 0) {
                print "ERROR: No [functions.*] sections found"
                err = 1
              }
              if (err) exit 1
              printf "OK: All %d Edge Functions have verify_jwt = true\n", count
            }
          ' "$CONFIG"

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npx jest --ci --coverage
